<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>亚马逊 HTML 转换器 — 卖家后台兼容工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
          </div>
          <div class="brand-text">
            <h1>亚马逊 HTML 转换器</h1>
            <p>卖家后台兼容 · 一键精简输出</p>
          </div>
        </div>
      </header>

      <section class="toolbar" aria-label="编辑工具">
        <div class="toolbar-group">
          <span class="toolbar-label">格式</span>
          <button type="button" class="btn btn--ghost btn--icon" data-command="bold" title="加粗 (Ctrl+B)"><strong>B</strong></button>
          <button type="button" class="btn btn--ghost btn--icon" data-command="italic" title="斜体 (Ctrl+I)"><em>I</em></button>
          <button type="button" class="btn btn--ghost btn--icon" data-command="insertUnorderedList" title="无序列表"><span style="font-size:18px;line-height:1;">•</span></button>
          <button type="button" class="btn btn--ghost btn--icon" data-command="insertOrderedList" title="有序列表"><span style="font-size:13px;font-weight:600;">1.</span></button>
          <button type="button" class="btn btn--ghost btn--icon" id="headingBtn" title="加粗小标题"><span style="font-size:15px;font-weight:700;">H</span></button>
          <button type="button" class="btn btn--ghost btn--icon" id="paragraphBtn" title="正文"><span style="font-size:15px;font-weight:600;">P</span></button>
        </div>

        <div class="toolbar-divider"></div>

        <div class="emoji-picker">
          <button type="button" class="btn btn--ghost" id="emojiToggle" aria-expanded="false" aria-controls="emojiPanel" title="插入 emoji">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
            <span>Emoji</span>
          </button>
          <div class="emoji-panel" id="emojiPanel" hidden>
            <div class="emoji-group">
              <h3>卖点</h3>
              <div class="emoji-grid">
                <button type="button" data-emoji="✅">✅</button>
                <button type="button" data-emoji="⭐">⭐</button>
                <button type="button" data-emoji="🔥">🔥</button>
                <button type="button" data-emoji="💡">💡</button>
                <button type="button" data-emoji="👍">👍</button>
                <button type="button" data-emoji="💪">💪</button>
                <button type="button" data-emoji="🏆">🏆</button>
                <button type="button" data-emoji="💎">💎</button>
              </div>
            </div>
            <div class="emoji-group">
              <h3>物流</h3>
              <div class="emoji-grid">
                <button type="button" data-emoji="🚚">🚚</button>
                <button type="button" data-emoji="📦">📦</button>
                <button type="button" data-emoji="🎁">🎁</button>
                <button type="button" data-emoji="🛒">🛒</button>
                <button type="button" data-emoji="⏱️">⏱️</button>
                <button type="button" data-emoji="🌍">🌍</button>
              </div>
            </div>
            <div class="emoji-group">
              <h3>提示</h3>
              <div class="emoji-grid">
                <button type="button" data-emoji="⚠️">⚠️</button>
                <button type="button" data-emoji="❌">❌</button>
                <button type="button" data-emoji="🔔">🔔</button>
                <button type="button" data-emoji="📌">📌</button>
                <button type="button" data-emoji="🔍">🔍</button>
                <button type="button" data-emoji="📏">📏</button>
              </div>
            </div>
            <div class="emoji-group">
              <h3>方向</h3>
              <div class="emoji-grid">
                <button type="button" data-emoji="➡️">➡️</button>
                <button type="button" data-emoji="⬅️">⬅️</button>
                <button type="button" data-emoji="⬆️">⬆️</button>
                <button type="button" data-emoji="⬇️">⬇️</button>
                <button type="button" data-emoji="↗️">↗️</button>
                <button type="button" data-emoji="↘️">↘️</button>
                <button type="button" data-emoji="🔼">🔼</button>
                <button type="button" data-emoji="🔽">🔽</button>
                <button type="button" data-emoji="▶️">▶️</button>
                <button type="button" data-emoji="◀️">◀️</button>
                <button type="button" data-emoji="🔁">🔁</button>
                <button type="button" data-emoji="🔄">🔄</button>
                <button type="button" data-emoji="➤">➤</button>
                <button type="button" data-emoji="→">→</button>
                <button type="button" data-emoji="✔">✔</button>
                <button type="button" data-emoji="★">★</button>
              </div>
            </div>
          </div>
        </div>

        <div class="toolbar-spacer"></div>

        <div class="toolbar-group toolbar-group--actions">
          <button type="button" class="btn btn--primary" id="copyBtn">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            <span>复制 HTML</span>
          </button>
          <button type="button" class="btn btn--danger" id="clearBtn">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            <span>清空</span>
          </button>
          <button type="button" class="btn btn--ghost" id="sampleBtn">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <span>示例</span>
          </button>
        </div>
      </section>

      <section class="workspace">
        <article class="panel">
          <div class="panel-head">
            <div class="panel-title">
              <svg class="icon icon--muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
              <h2>富文本输入</h2>
            </div>
            <span class="panel-meta">支持 Word、飞书、网页粘贴</span>
          </div>
          <div id="editor" class="editor" contenteditable="true" spellcheck="false" aria-label="富文本输入区"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div class="panel-title">
              <svg class="icon icon--muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
              <h2>亚马逊 HTML</h2>
            </div>
            <span class="panel-meta" id="charCount">0 字符</span>
          </div>
          <textarea id="htmlOutput" class="code-output" spellcheck="false" aria-label="HTML 输出区"></textarea>
        </article>
      </section>

      <section class="preview-section">
        <div class="panel-head">
          <div class="panel-title">
            <svg class="icon icon--muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <h2>实时预览</h2>
          </div>
          <span class="panel-meta">保守输出，不生成 h1/h2/h3 等标题标签</span>
        </div>
        <div id="preview" class="preview"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
